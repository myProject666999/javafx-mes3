spring:
  application:
    name: javafx-mes
  datasource:
    url: jdbc:sqlite:mes.db
    driver-class-name: org.sqlite.JDBC
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true

logging:
  level:
    com.mes: DEBUG
    org.springframework: INFO
